server.port=8090
spring.application.name=Bem-Vindo Application

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Active Directory LDAP Configuration
ldap.url=ldap://your-ad-server:389
ldap.base=dc=your,dc=domain,dc=com
ldap.userDn=cn=your-bind-user,cn=Users,dc=your,dc=domain,dc=com
ldap.password=your-bind-user-password
ldap.userSearchBase=ou=Users
ldap.userSearchFilter=(sAMAccountName={0})

# JWT Configuration
jwt.secret=your-jwt-secret
jwt.expiration=86400000

